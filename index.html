<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poznaj-sie - Czat Losowy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
   <div id="welcome-screen" class="welcome-container">
        
        <div class="logo-wrapper" style="max-width: 140px; margin: 0 auto 15px auto;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
              <rect width="500" height="500" rx="100" fill="#11141a"/>
              <g transform="translate(25, 25)">
                <circle cx="225" cy="225" r="140" fill="#00ff66" opacity="0.03" filter="blur(20px)"/>
                <circle cx="225" cy="225" r="100" fill="#00f0ff" opacity="0.03" filter="blur(20px)"/>
                <path d="M 160 140 C 100 140, 90 190, 90 220 C 90 270, 130 290, 170 290 C 185 290, 180 320, 160 340 C 200 330, 230 300, 240 280 C 250 280, 255 280, 260 275 C 240 240, 240 180, 190 150 C 180 143, 170 140, 160 140 Z" fill="none" stroke="#7000ff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M 290 140 C 350 140, 360 190, 360 220 C 360 270, 320 290, 280 290 C 265 290, 270 320, 290 340 C 250 330, 220 300, 210 280 C 200 280, 195 280, 190 275 C 210 240, 210 180, 260 150 C 270 143, 280 140, 290 140 Z" fill="none" stroke="#00ff66" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
                <line x1="275" y1="200" x2="305" y2="230" stroke="#00ff66" stroke-width="12" stroke-linecap="round"/>
                <line x1="305" y1="200" x2="275" y2="230" stroke="#00ff66" stroke-width="12" stroke-linecap="round"/>
                <circle cx="145" cy="215" r="16" fill="none" stroke="#00f0ff" stroke-width="12"/>
                <path d="M 190 150 C 210 135, 240 135, 260 150" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
              </g>
              <text x="250" y="420" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="34" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="3">POZNAJ<tspan fill="#00ff66">-</tspan>SIE</text>
            </svg>
        </div>
        <h1>Poznaj kogoś nowego!</h1>
        <h3>Kim jesteś?</h3>
        <div class="radio-group">
            <label class="option-button">
                <input type="radio" name="my-gender" value="male" checked>
                <span>Mężczyzna</span>
            </label>
            <label class="option-button">
                <input type="radio" name="my-gender" value="female">
                <span>Kobieta</span>
            </label>
        </div>

        <h3>Kogo szukasz?</h3>
        <div class="radio-group">
            <label class="option-button">
                <input type="radio" name="search-gender" value="male">
                <span>Mężczyzny</span>
            </label>
            <label class="option-button">
                <input type="radio" name="search-gender" value="female">
                <span>Kobiety</span>
            </label>
            <label class="option-button">
                <input type="radio" name="search-gender" value="anyone" checked>
                <span>Kogokolwiek</span>
            </label>
        </div>

        <p id="online-counter" style="color: #6c757d; font-size: 0.95rem; margin-bottom: 15px; font-weight: bold; text-align: center;">
            Aktualnie online: <span id="online-count" style="color: #28a745;">0</span> osób
        </p>

        <button type="button" class="start-btn" id="start-btn">Rozpocznij losowanie</button>
    </div>

    <div class="chat-container id-hidden" id="chat-screen">
        <div class="chat-box">
            <div class="chat-main-area">
                <div class="messages" id="messages-box">
                    <p class="system-msg">Łączenie z rozmówcą...</p>
                </div>

                <div class="game-box id-hidden" id="game-board">
                    <div class="cell" data-index="0"></div>
                    <div class="cell" data-index="1"></div>
                    <div class="cell" data-index="2"></div>
                    <div class="cell" data-index="3"></div>
                    <div class="cell" data-index="4"></div>
                    <div class="cell" data-index="5"></div>
                    <div class="cell" data-index="6"></div>
                    <div class="cell" data-index="7"></div>
                    <div class="cell" data-index="8"></div>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="message-input" placeholder="Napisz wiadomość..." disabled>
                <button type="button" id="send-btn" disabled>Wyślij</button>
                <button type="button" id="game-toggle-btn" class="game-btn">🎮 Gra</button>
                <button type="button" id="leave-btn" class="leave-btn">❌ Rozłącz</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
